<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="ab">0</p>
    <script>
        let ab = 0;
        let out = document.getElementById("ab")
        function inc() {

            if (ab < 200) {
                ab++
                out.innerHTML = ab
            } else {
                out.innerHTML = ab
            }
        }
        setInterval(inc, 10)
    </script>
</body>

</html>
